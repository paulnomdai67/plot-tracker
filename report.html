<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Site Report — Plot Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a3045;--text:#e8eaf0;--muted:#6b7491;--accent:#4f8ef7;--complete:#3db87a;--snagging:#e05252;--measured:#5b6899;--production:#c48a2f;--ready:#3b9ede;--installed:#9b7fe8}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header-left{display:flex;align-items:center;gap:16px}
    .logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px}
    .logo-icon{width:30px;height:30px;background:var(--accent);border-radius:7px;display:grid;place-items:center}
    .logo-icon svg{width:16px;height:16px}
    .nav-links{display:flex;gap:4px}
    .nav-link{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;color:var(--muted);text-decoration:none;transition:all .15s;border:1px solid transparent}
    .nav-link:hover{color:var(--text);background:var(--surface2)}
    .nav-link.active{color:var(--accent);border-color:var(--border)}
    .header-right{display:flex;align-items:center;gap:10px}
    .user-chip{font-size:13px;color:var(--muted);padding:4px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:20px}
    .role-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px}
    .role-admin{background:#4f8ef722;color:#4f8ef7}
    .role-standard{background:#6b749122;color:#6b7491}
    .role-director{background:#f74f9522;color:#f74f95}
    .role-head{background:#f7954f22;color:#f7954f}
    .btn-sm{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;background:transparent;border:1px solid var(--border);color:var(--muted)}
    .btn-sm:hover{border-color:var(--accent);color:var(--accent)}
    .controls{padding:16px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:var(--surface)}
    select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 12px;cursor:pointer}
    select:focus{outline:none;border-color:var(--accent)}
    select:disabled{opacity:.4;cursor:not-allowed}
    .btn-generate{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;background:var(--accent);color:#fff;border:none}
    .btn-generate:hover{opacity:.85}
    .btn-print{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;background:var(--complete);color:#fff;border:none;display:none}
    .report-wrap{max-width:900px;margin:24px auto;padding:0 24px 60px}
    .report-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:20px}
    .report-title{font-size:22px;font-weight:600;margin-bottom:4px}
    .report-sub{font-size:13px;color:var(--muted)}
    .progress-bar-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin:20px 0}
    .progress-bar{height:10px;border-radius:5px;background:var(--surface2);overflow:hidden;display:flex}
    .progress-segment{height:100%}
    .progress-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
    .legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
    .legend-dot{width:8px;height:8px;border-radius:50%}
    .report-section{margin-bottom:20px}
    .section-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
    .section-count{font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:4px;color:var(--text)}
    .plot-table{width:100%;border-collapse:collapse}
    .plot-table th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
    .plot-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border)}
    .plot-table tr:last-child td{border-bottom:none}
    .plot-table tr:hover td{background:var(--surface2)}
    .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
    .placeholder-msg{padding:60px;text-align:center;color:var(--muted)}
    @media print{
      header,.controls,.btn-print{display:none!important}
      body{background:#fff;color:#000}
      .report-card{border:1px solid #ddd;box-shadow:none}
      .report-wrap{margin:0;padding:0;max-width:100%}
    }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      Plot Tracker
    </div>
    <nav class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="index.html" class="nav-link">Installation</a>
      <a href="log.html" class="nav-link">Log</a>
      <a href="report.html" class="nav-link active">Report</a>
    </nav>
  </div>
  <div class="header-right">
    <span class="user-chip" id="user-chip">…</span>
    <span class="role-badge" id="role-badge"></span>
    <button class="btn-sm" onclick="signOut()">Sign out</button>
  </div>
</header>

<div class="controls">
  <select id="sel-dev" onchange="onDevChange()"><option value="">— Developer —</option></select>
  <select id="sel-site" disabled><option value="">— Site —</option></select>
  <button class="btn-generate" onclick="generateReport()">Generate Report</button>
  <button class="btn-print" id="btn-print" onclick="window.print()">🖨 Print / PDF</button>
</div>

<div class="report-wrap">
  <div id="report-placeholder" class="placeholder-msg">Select a developer and site, then click Generate Report</div>
  <div id="report-output" style="display:none"></div>
</div>

<script>
  const SUPABASE_URL = 'https://fddnkveadygyfjlkuhyl.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZkZG5rdmVhZHlneWZqbGt1aHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDUwNzIsImV4cCI6MjA5MDcyMTA3Mn0.23x_7Pl_XvhG4dwiwYVFVmFSaQEuxZZcK1gLC58Q3dM';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  const STATUSES=['Measured','In Production','Ready','Installed','Snagging','Complete'];
  const STATUS_COLORS={Measured:'#5b6899','In Production':'#c48a2f',Ready:'#3b9ede',Installed:'#9b7fe8',Snagging:'#e05252',Complete:'#3db87a'};

  let currentUser=null, userRole='installation_user';
  let developers=[], sites=[];

  function getRoleLabel(){const l={system_admin:'System Admin',director:'Director',estimate_head:'Estimate Head',estimate_user:'Estimate User',production_head:'Production Head',production_user:'Production User',installation_head:'Install Head',installation_user:'Install User',care_head:'Care Head',care_user:'Care User',admin:'Admin',standard:'Standard'};return l[userRole]||userRole}
  function getRoleBadgeClass(){if(userRole==='system_admin')return 'role-admin';if(userRole==='director')return 'role-director';if(userRole.endsWith('_head'))return 'role-head';return 'role-standard'}

  async function init() {
    const { data:{ session } } = await sb.auth.getSession();
    if (!session) { window.location.href='login.html'; return; }
    currentUser=session.user;
    document.getElementById('user-chip').textContent=currentUser.user_metadata?.full_name||currentUser.email;
    let roleData = null;
    try { const { data } = await sb.from('user_roles').select('role').eq('user_id',currentUser.id).single(); roleData = data; } catch(_) {}
    userRole=roleData?.role||'installation_user';
    const badge=document.getElementById('role-badge');
    badge.textContent=getRoleLabel(); badge.className='role-badge '+getRoleBadgeClass();
    const { data }=await sb.from('developers').select('*').order('name');
    developers=data||[];
    const sel=document.getElementById('sel-dev');
    sel.innerHTML='<option value="">— Developer —</option>'+developers.map(d=>`<option value="${d.id}">${esc(d.name)}</option>`).join('');
  }

  async function signOut(){await sb.auth.signOut();window.location.href='login.html'}

  async function onDevChange(){
    const devId=document.getElementById('sel-dev').value;
    const siteSel=document.getElementById('sel-site');
    if(!devId){siteSel.innerHTML='<option value="">— Site —</option>';siteSel.disabled=true;return}
    const{data}=await sb.from('sites').select('*').eq('developer_id',devId).order('name');
    sites=data||[];
    siteSel.innerHTML='<option value="">— Site —</option>'+sites.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
    siteSel.disabled=false;
  }

  async function generateReport(){
    const devId=document.getElementById('sel-dev').value;
    const siteId=document.getElementById('sel-site').value;
    if(!devId||!siteId){alert('Please select a developer and site');return}
    const dev=developers.find(d=>d.id===devId);
    const site=sites.find(s=>s.id===siteId);
    const[{data:plots},{data:snags},{data:deliveries}]=await Promise.all([
      sb.from('plots').select('*').eq('site_id',siteId).order('number'),
      sb.from('snagging_photos').select('plot_id').eq('site_id',siteId),
      sb.from('deliveries').select('*').eq('site_id',siteId)
    ]);
    const photoCounts={};(snags||[]).forEach(r=>{photoCounts[r.plot_id]=(photoCounts[r.plot_id]||0)+1});
    const total=(plots||[]).length;
    const counts={};STATUSES.forEach(s=>counts[s]=0);
    (plots||[]).forEach(p=>{if(counts[p.status]!==undefined)counts[p.status]++});
    const complete=counts['Complete'];
    const pct=total?Math.round((complete/total)*100):0;
    const today=new Date();today.setHours(0,0,0,0);
    const in7=new Date(today);in7.setDate(in7.getDate()+7);
    const upcoming=(plots||[]).filter(p=>{if(!p.install_date)return false;const d=new Date(p.install_date);return d>=today&&d<=in7}).sort((a,b)=>new Date(a.install_date)-new Date(b.install_date));
    const activSnags=(plots||[]).filter(p=>p.status==='Snagging');
    const pendingDel=(deliveries||[]).filter(d=>d.status!=='Arrived');

    function plotRows(arr){
      if(!arr.length)return'<tr><td colspan="5" style="color:var(--muted);font-style:italic;padding:12px">None</td></tr>';
      return arr.map(p=>`
        <tr>
          <td><strong>Plot ${esc(p.number)}</strong></td>
          <td><span class="status-dot" style="background:${STATUS_COLORS[p.status]||'#888'}"></span>${esc(p.status)}</td>
          <td>${esc(p.product_type||'—')}</td>
          <td>${p.install_date?formatDate(p.install_date):'—'}</td>
          <td>${esc(p.notes||'—')}</td>
        </tr>`).join('');
    }

    const byStatus={};
    STATUSES.forEach(s=>{byStatus[s]=(plots||[]).filter(p=>p.status===s)});
    const resolvedSnags=(plots||[]).filter(p=>p.snag_resolved_at);

    const html=`
      <div class="report-card">
        <div class="report-title">${esc(dev?.name||'')} — ${esc(site?.name||'')}</div>
        <div class="report-sub">Generated ${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
        <div class="progress-bar-wrap">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px">
            <span>${complete} of ${total} plots complete</span><span style="font-weight:600;color:var(--complete)">${pct}%</span>
          </div>
          <div class="progress-bar">
            ${STATUSES.filter(s=>counts[s]>0).map(s=>`<div class="progress-segment" style="width:${(counts[s]/total)*100}%;background:${STATUS_COLORS[s]}"></div>`).join('')}
          </div>
          <div class="progress-legend">
            ${STATUSES.filter(s=>counts[s]>0).map(s=>`<div class="legend-item"><div class="legend-dot" style="background:${STATUS_COLORS[s]}"></div>${s} (${counts[s]})</div>`).join('')}
          </div>
        </div>
      </div>

      ${upcoming.length?`
      <div class="report-card report-section">
        <div class="section-title">📅 Upcoming Installations (next 7 days) <span class="section-count">${upcoming.length}</span></div>
        <table class="plot-table"><thead><tr><th>Plot</th><th>Status</th><th>Product</th><th>Date</th><th>Notes</th></tr></thead>
        <tbody>${plotRows(upcoming)}</tbody></table>
      </div>`:''}

      ${activSnags.length?`
      <div class="report-card report-section">
        <div class="section-title">🔧 Active Snagging <span class="section-count">${activSnags.length}</span></div>
        <table class="plot-table"><thead><tr><th>Plot</th><th>Status</th><th>Product</th><th>Date</th><th>Notes</th></tr></thead>
        <tbody>${plotRows(activSnags)}</tbody></table>
      </div>`:''}

      ${pendingDel.length?`
      <div class="report-card report-section">
        <div class="section-title">📦 Pending Deliveries <span class="section-count">${pendingDel.length}</span></div>
        <table class="plot-table"><thead><tr><th>Item</th><th>Status</th><th>Expected</th><th>Notes</th></tr></thead>
        <tbody>${pendingDel.map(d=>`<tr><td>${esc(d.item)}</td><td>${esc(d.status)}</td><td>${d.expected_date?formatDate(d.expected_date):'—'}</td><td>${esc(d.notes||'—')}</td></tr>`).join('')}</tbody></table>
      </div>`:''}

      ${STATUSES.map(s=>byStatus[s]?.length?`
      <div class="report-card report-section">
        <div class="section-title"><span style="display:inline-flex;align-items:center;gap:6px"><span class="status-dot" style="background:${STATUS_COLORS[s]};width:10px;height:10px;border-radius:50%;display:inline-block"></span>${s}</span><span class="section-count">${byStatus[s].length}</span></div>
        <table class="plot-table"><thead><tr><th>Plot</th><th>Status</th><th>Product</th><th>Date</th><th>Notes</th></tr></thead>
        <tbody>${plotRows(byStatus[s])}</tbody></table>
      </div>`:'').join('')}

      ${resolvedSnags.length?`
      <div class="report-card report-section">
        <div class="section-title">✓ Resolved Snagging <span class="section-count">${resolvedSnags.length}</span></div>
        <table class="plot-table"><thead><tr><th>Plot</th><th>Status</th><th>Product</th><th>Resolved</th><th>Notes</th></tr></thead>
        <tbody>${resolvedSnags.map(p=>`<tr><td><strong>Plot ${esc(p.number)}</strong></td><td>${esc(p.status)}</td><td>${esc(p.product_type||'—')}</td><td>${p.snag_resolved_at?formatDate(p.snag_resolved_at.split('T')[0]):'—'}</td><td>${esc(p.notes||'—')}</td></tr>`).join('')}</tbody></table>
      </div>`:''}
    `;

    document.getElementById('report-placeholder').style.display='none';
    document.getElementById('report-output').innerHTML=html;
    document.getElementById('report-output').style.display='block';
    document.getElementById('btn-print').style.display='';
    document.getElementById('report-output').scrollIntoView({behavior:'smooth'});
  }

  function formatDate(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

  init();
</script>
</body>
</html>
