<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plot Tracker — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0f1117; --surface: #181c27; --border: #2a3045;
      --text: #e8eaf0; --muted: #6b7491; --accent: #4f8ef7;
      --error: #e05252;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-icon { width: 34px; height: 34px; background: var(--accent); border-radius: 8px; display: grid; place-items: center; }
    .logo-icon svg { width: 18px; height: 18px; }
    .logo-text { font-size: 17px; font-weight: 600; }
    .logo-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 10px 14px;
      font-size: 14px; font-family: 'DM Sans', sans-serif;
      outline: none; margin-bottom: 16px; transition: border .15s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    .btn {
      width: 100%; padding: 11px; border-radius: 8px; font-size: 14px;
      font-weight: 600; font-family: 'DM Sans', sans-serif;
      cursor: pointer; border: none; transition: opacity .15s; margin-bottom: 10px;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .toggle { text-align: center; font-size: 13px; color: var(--muted); margin-top: 8px; }
    .toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }
    .toggle a:hover { text-decoration: underline; }
    .error-msg {
      background: rgba(224,82,82,0.1); border: 1px solid var(--error);
      color: var(--error); border-radius: 7px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }
    .success-msg {
      background: rgba(61,184,122,0.1); border: 1px solid #3db87a;
      color: #3db87a; border-radius: 7px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .success-msg.show { display: block; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.6">
        <rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1.2"/>
        <rect x="9" y="1.5" width="5.5" height="5.5" rx="1.2"/>
        <rect x="1.5" y="9" width="5.5" height="5.5" rx="1.2"/>
        <rect x="9" y="9" width="5.5" height="5.5" rx="1.2"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Plot Tracker</div>
      <div class="logo-sub">Windows &amp; Doors</div>
    </div>
  </div>

  <div id="error-msg" class="error-msg"></div>
  <div id="success-msg" class="success-msg"></div>

  <div id="login-form">
    <h1>Sign in</h1>
    <p class="subtitle">Enter your credentials to access your sites</p>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="you@company.com" autocomplete="email"/>
    <label>Password</label>
    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
    <button class="btn btn-primary" id="login-btn" onclick="signIn()">Sign In</button>
    <div class="toggle">Don't have an account? <a onclick="showRegister()">Register</a></div>
  </div>

  <div id="register-form" style="display:none">
    <h1>Create account</h1>
    <p class="subtitle">Register to start tracking your plots</p>
    <label>Full Name</label>
    <input type="text" id="reg-name" placeholder="e.g. John Smith"/>
    <label>Email</label>
    <input type="email" id="reg-email" placeholder="you@company.com"/>
    <label>Password</label>
    <input type="password" id="reg-password" placeholder="Min. 6 characters"/>
    <button class="btn btn-primary" id="reg-btn" onclick="register()">Create Account</button>
    <div class="toggle">Already have an account? <a onclick="showLogin()">Sign in</a></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://fddnkveadygyfjlkuhyl.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZkZG5rdmVhZHlneWZqbGt1aHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDUwNzIsImV4cCI6MjA5MDcyMTA3Mn0.23x_7Pl_XvhG4dwiwYVFVmFSaQEuxZZcK1gLC58Q3dM';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'index.html';
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('success-msg').classList.remove('show');
  }
  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('error-msg').classList.remove('show');
  }
  function clearMsgs() {
    document.getElementById('error-msg').classList.remove('show');
    document.getElementById('success-msg').classList.remove('show');
  }
  function showRegister() {
    clearMsgs();
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('register-form').style.display = 'block';
  }
  function showLogin() {
    clearMsgs();
    document.getElementById('register-form').style.display = 'none';
    document.getElementById('login-form').style.display = 'block';
  }

  async function signIn() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showError('Please enter your email and password.'); return; }
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      showError(error.message);
      btn.disabled = false; btn.textContent = 'Sign In';
    } else {
      window.location.href = 'index.html';
    }
  }

  async function register() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }
    const btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = 'Creating account…';
    const { error } = await sb.auth.signUp({
      email, password,
      options: { data: { full_name: name } }
    });
    if (error) {
      showError(error.message);
      btn.disabled = false; btn.textContent = 'Create Account';
    } else {
      showSuccess('Account created! Signing you in…');
      setTimeout(async () => {
        const { error: signInError } = await sb.auth.signInWithPassword({ email, password });
        if (!signInError) window.location.href = 'index.html';
        else { btn.disabled = false; btn.textContent = 'Create Account'; showLogin(); }
      }, 1000);
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('register-form').style.display !== 'none') register();
    else signIn();
  });
</script>
</body>
</html>
